<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <nav>
        <h1>Adote seu melhor aumigo aqui!</h1>
        <img src="assets/Confira-5-curiosidades-sobre-como-e-a-visao-do-cachorro-removebg-preview.png" alt="">
    </nav>

    <h2>Para começar a adoção de seu amigo</h2>
    <h3>Responda esse pequeno formulário:</h3>
    <form id="adoption-form">
        <label for="Nome">Nome Completo:</label><br>
        <input type="text" id="Nome" placeholder="Digite seu Nome">
        <br>
        <br>
        <label for="Email">Email:</label><br>
        <input type="email" id="Email" placeholder="Digite seu Email">
        <br>
        <br>
        <label for="telefone">Telefone:</label>
        <input type="tel" id="Telefone" placeholder="Digite seu Telefone">
        <br>
        <br>
        <label for="CPF">CPF:</label>
        <input type="text" id="CPF" placeholder="Digite seu CPF">
        <br>
        <br>
        <label for="Idade">Idade:</label>
        <input type="number" id="Idade" placeholder="Digite sua Idade">
        <br>
        <br>
        <label for="Cidade">Cidade:</label>
        <input type="text" id="Cidade" placeholder="Digite sua Cidade">
        <br>
        <br>
        <label for="Moradia">Moradia:</label>
        <select name="moradia" id="Moradia">
            <option value=""></option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>
        <br>
        <br>
        <label for="quintal">Possui Quintal?</label>
        <br>
        <input type="radio" name="quintal" value="sim"> Sim
        <input type="radio" name="quintal" value="nao"> Não
        <br>
        <label for="pets">ja teve Pets?</label>
        <br>
        <input type="radio" name="pets" value="sim"> Sim
        <input type="radio" name="pets" value="nao"> Não
        <br>
        <br>
        <label for="horas">Quantas horas o pet ficará sozinho?</label>
        <input type="number" id="horas">
        <br>
        <br>
        <label for="motivo">Qual o motivo da adoção?</label>
        <br>
        <textarea id="motivo" placeholder="Descreva seu motivo para adotar um pet..."></textarea>
        <br>
        <br>
        <label for="permite">Permite animais?(Somente Apartamentos)</label>
        <br>
        <input type="radio" name="permite" value="sim"> Sim
        <input type="radio" name="permite" value="nao"> Não
        <br>
        <br>
        <label for="financeiro">Possui condições financeiras para cuidar de um pet?</label>
        <br>
        <input type="radio" name="financeiro" value="sim"> Sim
        <input type="radio" name="financeiro" value="nao"> Não
        <br>
        <br>
        <label for="impulso">Decidiu adotar hoje?</label>
        <br>
        <input type="radio" name="impulso" value="sim"> Sim
        <input type="radio" name="impulso" value="nao"> Não
        <br>
        <br>
        <label for="financeiro">Aceito termos de condições?</label>
        <br>
        <input type="radio" name="financeiro" value="sim"> Sim
        <input type="radio" name="financeiro" value="nao"> Não
        <br>
        <br>
        <button type="submit">Enviar</button>
    </form>

    <div id="resultado"></div>

    <script src="script.js"></script>

</body>

</html>
